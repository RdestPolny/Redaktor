# Cloud Build — automatyczny deploy na Cloud Run
# Użycie: gcloud builds submit --config cloudbuild.yaml
#
# UWAGA: Cloud Run ma limit 32MB na HTTP request body (nie można zmienić!).
# Dla plików > 32MB konieczny jest upload przez GCS (signed URL) lub lokalny deploy.

steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/redaktor-ai', '.']

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/redaktor-ai']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'redaktor-ai'
      - '--image=gcr.io/$PROJECT_ID/redaktor-ai'
      - '--region=europe-central2'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=4Gi'          # 4GB dla dużych PDF w pamięci
      - '--cpu=2'               # 2 CPU dla równoległego przetwarzania
      - '--timeout=900'         # 15 min timeout dla przetwarzania
      - '--concurrency=1'       # 1 request naraz (single-user design)
      - '--set-env-vars=GOOGLE_API_KEY=${_GOOGLE_API_KEY}'

images:
  - 'gcr.io/$PROJECT_ID/redaktor-ai'

substitutions:
  _GOOGLE_API_KEY: ''  # Podaj przy uruchomieniu: --substitutions=_GOOGLE_API_KEY=twój-klucz
